<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハウス訪問オーダーメモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0f7f0;
      color: #333;
      padding: 16px;
    }
    h1 {
      font-size: 1.3rem;
      color: #2d6a2d;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .visit-info {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .visit-info label {
      font-size: 0.8rem;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }
    .visit-info input {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 1rem;
      width: 100%;
    }
    .visit-info .field { flex: 1; min-width: 140px; }
    .form-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .form-card h2 {
      font-size: 1rem;
      color: #2d6a2d;
      margin-bottom: 12px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .form-grid label {
      font-size: 0.75rem;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }
    .input-wrap {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .input-wrap input {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      font-size: 1rem;
      background: #fafafa;
      transition: border 0.2s;
    }
    .input-wrap input:focus {
      outline: none;
      border-color: #4caf50;
      background: white;
    }
    .btn-mic {
      background: #e8f5e9;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-mic:active,
    .btn-mic.recording {
      background: #ff5252;
      color: white;
      animation: pulse 0.8s infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .btn-voice-all {
      width: 100%;
      padding: 14px;
      background: #43a047;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .btn-voice-all.recording {
      background: #ff5252;
      animation: pulse 0.8s infinite;
    }
    .voice-hint {
      background: #fff8e1;
      border-left: 4px solid #ffc107;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .btn-add {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-add:active { background: #388e3c; }
    .list-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      overflow-x: auto;
    }
    .list-card h2 {
      font-size: 1rem;
      color: #2d6a2d;
      margin-bottom: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 600px;
    }
    th {
      background: #e8f5e9;
      color: #2d6a2d;
      padding: 8px 6px;
      text-align: left;
      font-weight: bold;
      white-space: nowrap;
    }
    td {
      padding: 8px 6px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fef9; }
    .btn-delete {
      background: #ffebee;
      color: #c62828;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-export {
      width: 100%;
      padding: 16px;
      background: #1565c0;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    .btn-export:active { background: #0d47a1; }
    .btn-sheet {
      width: 100%;
      padding: 16px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 16px;
      transition: background 0.2s;
    }
    .btn-sheet:active { background: #1b5e20; }
    .badge {
      display: inline-block;
      background: #4caf50;
      color: white;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.8rem;
      margin-left: 8px;
    }
    .empty-msg {
      text-align: center;
      color: #aaa;
      padding: 20px;
      font-size: 0.9rem;
    }
    .voice-result {
      background: #f1f8e9;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.85rem;
      color: #444;
      margin-top: 10px;
      min-height: 36px;
      display: none;
    }
    .voice-result.show { display: block; }
    .send-msg {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-weight: bold;
      display: none;
    }
    .send-msg.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }
    .send-msg.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }
  </style>
</head>
<body>

  <h1>🌿 ハウス訪問オーダーメモ</h1>

  <div class="visit-info">
    <div class="field">
      <label>📅 訪問日</label>
      <input type="date" id="visitDate">
    </div>
    <div class="field">
      <label>🏡 生産者名</label>
      <input type="text" id="producerName" placeholder="例：○○農園">
    </div>
  </div>

  <div class="form-card">
    <h2>➕ オーダー入力</h2>
    <button class="btn-voice-all" id="btnVoiceAll" onclick="startVoiceAll()">
      🎤 まとめて音声入力
    </button>
    <div class="voice-hint">
      💡 <b>話し方の例：</b><br>
      「田中様　パンジー　9センチ　100本　3月15日　色指定あり」<br>
      → お客様名・商品名・サイズ・数量・納期・備考に自動で入ります
    </div>
    <div class="voice-result" id="voiceResult">🎤 認識中...</div>
    <div class="form-grid">
      <div>
        <label>👤 お客様名</label>
        <div class="input-wrap">
          <input type="text" id="customerName" placeholder="例：田中様">
          <button class="btn-mic" onclick="startVoiceField('customerName')">🎤</button>
        </div>
      </div>
      <div>
        <label>🌸 商品名</label>
        <div class="input-wrap">
          <input type="text" id="productName" placeholder="例：パンジー">
          <button class="btn-mic" onclick="startVoiceField('productName')">🎤</button>
        </div>
      </div>
      <div>
        <label>📐 サイズ</label>
        <div class="input-wrap">
          <input type="text" id="size" placeholder="例：9cm / 4号">
          <button class="btn-mic" onclick="startVoiceField('size')">🎤</button>
        </div>
      </div>
      <div>
        <label>🔢 数量</label>
        <div class="input-wrap">
          <input type="number" id="quantity" placeholder="例：100">
          <button class="btn-mic" onclick="startVoiceField('quantity')">🎤</button>
        </div>
      </div>
      <div>
        <label>📆 希望納期</label>
        <div class="input-wrap">
          <input type="text" id="deliveryDate" placeholder="例：3月15日">
          <button class="btn-mic" onclick="startVoiceField('deliveryDate')">🎤</button>
        </div>
      </div>
      <div>
        <label>📝 備考</label>
        <div class="input-wrap">
          <input type="text" id="remarks" placeholder="例：急ぎ / 色指定あり">
          <button class="btn-mic" onclick="startVoiceField('remarks')">🎤</button>
        </div>
      </div>
    </div>
    <button class="btn-add" onclick="addOrder()">✅ 追加する</button>
  </div>

  <div class="list-card">
    <h2>📋 入力済みオーダー <span class="badge" id="countBadge">0</span></h2>
    <div id="tableWrapper">
      <p class="empty-msg">まだオーダーがありません</p>
    </div>
  </div>

  <div class="send-msg" id="sendMsg"></div>

  <button class="btn-sheet" onclick="sendToSheet()">📊 スプレッドシートに送信</button>
  <button class="btn-export" onclick="exportCSV()">📤 CSVでエクスポート</button>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbx8Vl0WJlkvUtF3ejc5vEZya9YqcBGNMWMi1SBuLO9bbNeXVYe39TEq6oXh7uzE3NFS/exec';

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('visitDate').value = today;

  let orders = [];

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
  }

  function startVoiceField(fieldId) {
    if (!recognition) {
      alert('このブラウザは音声入力に対応していません。\nChromeをお使いください。');
      return;
    }
    const btn = event.target;
    btn.classList.add('recording');
    recognition.start();
    recognition.onresult = function(e) {
      document.getElementById(fieldId).value = e.results[0][0].transcript;
      btn.classList.remove('recording');
    };
    recognition.onerror = function() { btn.classList.remove('recording'); };
    recognition.onend = function() { btn.classList.remove('recording'); };
  }

  function startVoiceAll() {
    if (!recognition) {
      alert('このブラウザは音声入力に対応していません。\nChromeをお使いください。');
      return;
    }
    const btn = document.getElementById('btnVoiceAll');
    const resultDiv = document.getElementById('voiceResult');
    btn.classList.add('recording');
    btn.textContent = '🔴 聞いています... 話してください';
    resultDiv.classList.add('show');
    resultDiv.textContent = '🎤 認識中...';
    recognition.start();
    recognition.onresult = function(e) {
      const text = e.results[0][0].transcript;
      resultDiv.textContent = '📝 認識結果：' + text;
      parseVoiceInput(text);
      btn.classList.remove('recording');
      btn.textContent = '🎤 まとめて音声入力';
    };
    recognition.onerror = function() {
      btn.classList.remove('recording');
      btn.textContent = '🎤 まとめて音声入力';
      resultDiv.textContent = '❌ 認識できませんでした。もう一度お試しください。';
    };
    recognition.onend = function() {
      btn.classList.remove('recording');
      btn.textContent = '🎤 まとめて音声入力';
    };
  }

  function parseVoiceInput(text) {
    const parts = text.split(/[\s　、。,，]+/).filter(p => p.length > 0);
    if (parts.length >= 1) document.getElementById('customerName').value  = parts[0] || '';
    if (parts.length >= 2) document.getElementById('productName').value   = parts[1] || '';
    if (parts.length >= 3) document.getElementById('size').value          = parts[2] || '';
    if (parts.length >= 4) document.getElementById('quantity').value      = parts[3] || '';
    if (parts.length >= 5) document.getElementById('deliveryDate').value  = parts[4] || '';
    if (parts.length >= 6) document.getElementById('remarks').value       = parts.slice(5).join(' ') || '';
  }

  function addOrder() {
    const visitDate    = document.getElementById('visitDate').value;
    const producerName = document.getElementById('producerName').value.trim();
    const customerName = document.getElementById('customerName').value.trim();
    const productName  = document.getElementById('productName').value.trim();
    const size         = document.getElementById('size').value.trim();
    const quantity     = document.getElementById('quantity').value.trim();
    const deliveryDate = document.getElementById('deliveryDate').value;
    const remarks      = document.getElementById('remarks').value.trim();

    if (!customerName || !productName) {
      alert('⚠️ お客様名と商品名は必須です');
      return;
    }

    orders.push({ visitDate, producerName, customerName, productName, size, quantity, deliveryDate, remarks });
    renderTable();
    clearForm();
  }

  function renderTable() {
    const wrapper = document.getElementById('tableWrapper');
    document.getElementById('countBadge').textContent = orders.length;

    if (orders.length === 0) {
      wrapper.innerHTML = '<p class="empty-msg">まだオーダーがありません</p>';
      return;
    }

    let html = `
      <table>
        <thead>
          <tr>
            <th>お客様名</th><th>商品名</th><th>サイズ</th>
            <th>数量</th><th>希望納期</th><th>備考</th><th></th>
          </tr>
        </thead><tbody>
    `;

    orders.forEach((o, i) => {
      html += `
        <tr>
          <td>${o.customerName}</td>
          <td>${o.productName}</td>
          <td>${o.size}</td>
          <td>${o.quantity}</td>
          <td>${o.deliveryDate}</td>
          <td>${o.remarks}</td>
          <td><button class="btn-delete" onclick="deleteOrder(${i})">削除</button></td>
        </tr>
      `;
    });

    html += '</tbody></table>';
    wrapper.innerHTML = html;
  }

  function deleteOrder(index) {
    if (confirm('このオーダーを削除しますか？')) {
      orders.splice(index, 1);
      renderTable();
    }
  }

  function clearForm() {
    ['customerName','productName','size','quantity','deliveryDate','remarks']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('voiceResult').classList.remove('show');
    document.getElementById('customerName').focus();
  }

  async function sendToSheet() {
    if (orders.length === 0) {
      alert('⚠️ オーダーがありません');
      return;
    }

    const btn = document.querySelector('.btn-sheet');
    const msgDiv = document.getElementById('sendMsg');
    btn.textContent = '📊 送信中...';
    btn.disabled = true;

    try {
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(orders)
      });

      msgDiv.className = 'send-msg success';
      msgDiv.textContent = '✅ スプレッドシートに送信しました！';
      orders = [];
      renderTable();

    } catch (e) {
      msgDiv.className = 'send-msg error';
      msgDiv.textContent = '❌ 送信に失敗しました。通信状況を確認してください。';
    }

    btn.textContent = '📊 スプレッドシートに送信';
    btn.disabled = false;
  }

  function exportCSV() {
    if (orders.length === 0) {
      alert('⚠️ オーダーがありません');
      return;
    }

    const visitDate    = document.getElementById('visitDate').value;
    const producerName = document.getElementById('producerName').value;

    const header = ['訪問日','生産者名','お客様名','商品名','サイズ','数量','希望納期','備考'];
    const rows = orders.map(o => [
      o.visitDate, producerName, o.customerName, o.productName,
      o.size, o.quantity, o.deliveryDate, o.remarks
    ]);

    const csv = [header, ...rows]
      .map(r => r.map(v => `"${v}"`).join(','))
      .join('\n');

    const bom = '\uFEFF';
    const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `オーダー_${visitDate}_${producerName || '生産者'}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>

</body>
</html>
