<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ハウス訪問オーダーメモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background:#f0f7f0; color:#333; padding:16px;}
    h1 {font-size:1.3rem; color:#2d6a2d; margin-bottom:12px; display:flex; align-items:center; gap:8px;}
    .visit-info {background:white; border-radius:12px; padding:14px; margin-bottom:16px; box-shadow:0 2px 6px rgba(0,0,0,.08); display:flex; flex-wrap:wrap; gap:10px;}
    .visit-info label {font-size:.8rem; color:#666; display:block; margin-bottom:4px;}
    .visit-info input {border:1px solid #ccc; border-radius:8px; padding:8px 10px; font-size:1rem; width:100%;}
    .visit-info .field {flex:1; min-width:140px;}
    .form-card {background:white; border-radius:12px; padding:14px; margin-bottom:16px; box-shadow:0 2px 6px rgba(0,0,0,.08);}
    .form-card h2 {font-size:1rem; color:#2d6a2d; margin-bottom:12px;}
    .form-grid {display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .form-grid label {font-size:.75rem; color:#666; display:block; margin-bottom:4px;}
    .input-wrap {display:flex; gap:6px; align-items:center;}
    .input-wrap input {flex:1; border:1px solid #ccc; border-radius:8px; padding:10px; font-size:1rem; background:#fafafa; transition:border .2s;}
    .input-wrap input:focus {outline:none; border-color:#4caf50; background:white;}
    .btn-mic {background:#e8f5e9; border:none; border-radius:8px; padding:10px 12px; font-size:1.1rem; cursor:pointer;}
    .btn-mic.recording {background:#ff5252; color:white;}
    .btn-voice-all {width:100%; padding:14px; background:#43a047; color:white; border:none; border-radius:10px; font-size:1rem; font-weight:bold; cursor:pointer; margin-bottom:12px;}
    .btn-voice-all.recording {background:#ff5252;}
    .voice-hint {background:#fff8e1; border-left:4px solid #ffc107; border-radius:6px; padding:10px 12px; font-size:.8rem; color:#555; margin-bottom:12px; line-height:1.6;}
    .btn-add {width:100%; margin-top:14px; padding:14px; background:#4caf50; color:white; border:none; border-radius:10px; font-size:1.1rem; font-weight:bold; cursor:pointer;}
    .list-card {background:white; border-radius:12px; padding:14px; margin-bottom:16px; box-shadow:0 2px 6px rgba(0,0,0,.08); overflow-x:auto;}
    .list-card h2 {font-size:1rem; color:#2d6a2d; margin-bottom:12px;}
    table {width:100%; border-collapse:collapse; font-size:.85rem; min-width:600px;}
    th {background:#e8f5e9; color:#2d6a2d; padding:8px 6px; text-align:left; font-weight:bold; white-space:nowrap;}
    td {padding:8px 6px; border-bottom:1px solid #f0f0f0; vertical-align:top;}
    .btn-delete {background:#ffebee; color:#c62828; border:none; border-radius:6px; padding:4px 10px; font-size:.8rem; cursor:pointer;}
    .btn-sheet, .btn-export {width:100%; padding:16px; border:none; border-radius:10px; font-size:1.1rem; font-weight:bold; cursor:pointer; margin-bottom:12px;}
    .btn-sheet {background:#2e7d32; color:white;}
    .btn-export {background:#1565c0; color:white;}
    .badge {display:inline-block; background:#4caf50; color:white; border-radius:20px; padding:2px 10px; font-size:.8rem; margin-left:8px;}
    .empty-msg {text-align:center; color:#aaa; padding:20px; font-size:.9rem;}
    .voice-result {background:#f1f8e9; border-radius:8px; padding:10px; font-size:.85rem; color:#444; margin-top:10px; min-height:36px; display:none;}
    .voice-result.show {display:block;}
    .send-msg {text-align:center; padding:12px; border-radius:8px; margin-bottom:12px; font-weight:bold; display:none;}
    .send-msg.success {background:#e8f5e9; color:#2e7d32; display:block;}
    .send-msg.error {background:#ffebee; color:#c62828; display:block;}
  </style>
</head>
<body>
  <h1>🌿 ハウス訪問オーダーメモ</h1>
  <div class="visit-info">
    <div class="field"><label>📅 訪問日</label><input type="date" id="visitDate"></div>
    <div class="field"><label>🏡 生産者名</label><input type="text" id="producerName" placeholder="例：○○農園"></div>
  </div>
  <div class="form-card">
    <h2>➕ オーダー入力</h2>
    <button class="btn-voice-all" id="btnVoiceAll" onclick="startVoiceAll()">🎤 まとめて音声入力</button>
    <div class="voice-hint"><b>例:</b> 「田中様 パンジー 9センチ 100本 3月15日 色指定あり」→自動入力</div>
    <div class="voice-result" id="voiceResult">🎤 認識中...</div>
    <div class="form-grid">
      <div><label>👤 お客様名</label><div class="input-wrap"><input type="text" id="customerName" placeholder="例：田中様"><button class="btn-mic" onclick="startVoiceField('customerName')">🎤</button></div></div>
      <div><label>🌸 商品名</label><div class="input-wrap"><input type="text" id="productName" placeholder="例：パンジー"><button class="btn-mic" onclick="startVoiceField('productName')">🎤</button></div></div>
      <div><label>📐 サイズ</label><div class="input-wrap"><input type="text" id="size" placeholder="例：9cm / 4号"><button class="btn-mic" onclick="startVoiceField('size')">🎤</button></div></div>
      <div><label>🔢 数量</label><div class="input-wrap"><input type="number" id="quantity" placeholder="例：100"><button class="btn-mic" onclick="startVoiceField('quantity')">🎤</button></div></div>
      <div><label>📆 希望納期</label><div class="input-wrap"><input type="text" id="deliveryDate" placeholder="例：3月15日"><button class="btn-mic" onclick="startVoiceField('deliveryDate')">🎤</button></div></div>
      <div><label>📝 備考</label><div class="input-wrap"><input type="text" id="remarks" placeholder="例：急ぎ / 色指定あり"><button class="btn-mic" onclick="startVoiceField('remarks')">🎤</button></div></div>
    </div>
    <button class="btn-add" onclick="addOrder()">✅ 追加する</button>
  </div>
  <div class="list-card">
    <h2>📋 入力済みオーダー <span class="badge" id="countBadge">0</span></h2>
    <div id="tableWrapper"><p class="empty-msg">まだオーダーがありません</p></div>
  </div>
  <div class="send-msg" id="sendMsg"></div>
  <button class="btn-sheet" onclick="sendToSheet()">📊 スプレッドシートに送信</button>
  <button class="btn-export" onclick="exportCSV()">📤 CSVでエクスポート</button>
<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbx8Vl0WJlkvUtF3ejc5vEZya9YqcBGNMWMi1SBuLO9bbNeXVYe39TEq6oXh7uzE3NFS/exec';
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('visitDate').value = today;
  let orders = [];
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = SpeechRecognition ? new SpeechRecognition() : null;
  if (recognition) { recognition.lang='ja-JP'; recognition.interimResults=false; recognition.maxAlternatives=1; }

  function startVoiceField(id) {
    if (!recognition) { alert('音声入力はChromeでご使用ください。'); return; }
    const btn = event.target;
    btn.classList.add('recording');
    recognition.start();
    recognition.onresult = e => { document.getElementById(id).value = e.results[0][0].transcript; btn.classList.remove('recording'); };
    recognition.onerror = () => btn.classList.remove('recording');
    recognition.onend = () => btn.classList.remove('recording');
  }

  function startVoiceAll() {
    if (!recognition) { alert('音声入力はChromeでご使用ください。'); return; }
    const btn = document.getElementById('btnVoiceAll');
    const res = document.getElementById('voiceResult');
    btn.classList.add('recording');
    btn.textContent = '🔴 聞いています...';
    res.classList.add('show');
    res.textContent = '🎤 認識中...';
    recognition.start();
    recognition.onresult = e => {
      const txt = e.results[0][0].transcript;
      res.textContent = '📝 認識結果：' + txt;
      parseVoiceInput(txt);
      btn.classList.remove('recording');
      btn.textContent = '🎤 まとめて音声入力';
    };
    recognition.onerror = () => { btn.classList.remove('recording'); btn.textContent = '🎤 まとめて音声入力'; res.textContent = '❌ 認識できませんでした。'; };
    recognition.onend = () => { btn.classList.remove('recording'); btn.textContent = '🎤 まとめて音声入力'; };
  }

  function parseVoiceInput(t) {
    const parts = t.split(/[\s　、。,，]+/).filter(p => p);
    if (parts[0]) document.getElementById('customerName').value = parts[0];
    if (parts[1]) document.getElementById('productName').value = parts[1];
    if (parts[2]) document.getElementById('size').value = parts[2];
    if (parts[3]) document.getElementById('quantity').value = parts[3];
    if (parts[4]) document.getElementById('deliveryDate').value = parts[4];
    if (parts[5]) document.getElementById('remarks').value = parts.slice(5).join(' ');
  }

  function addOrder() {
    const data = {
      visitDate: document.getElementById('visitDate').value,
      producerName: document.getElementById('producerName').value.trim(),
      customerName: document.getElementById('customerName').value.trim(),
      productName: document.getElementById('productName').value.trim(),
      size: document.getElementById('size').value.trim(),
      quantity: document.getElementById('quantity').value.trim(),
      deliveryDate: document.getElementById('deliveryDate').value,
      remarks: document.getElementById('remarks').value.trim()
    };
    if (!data.customerName || !data.productName) { alert('⚠️ お客様名と商品名は必須です'); return; }
    orders.push(data);
    renderTable();
    clearForm();
  }

  function renderTable() {
    const w = document.getElementById('tableWrapper');
    document.getElementById('countBadge').textContent = orders.length;
    if (!orders.length) { w.innerHTML = '<p class="empty-msg">まだオーダーがありません</p>'; return; }
    let html = '<table><thead><tr><th>お客様名</th><th>商品名</th><th>サイズ</th><th>数量</th><th>希望納期</th><th>備考</th><th></th></tr></thead><tbody>';
    orders.forEach((o, i) => {
      html += `<tr><td>${o.customerName}</td><td>${o.productName}</td><td>${o.size}</td><td>${o.quantity}</td><td>${o.deliveryDate}</td><td>${o.remarks}</td><td><button class="btn-delete" onclick="deleteOrder(${i})">削除</button></td></tr>`;
    });
    html += '</tbody></table>';
    w.innerHTML = html;
  }

  function deleteOrder(i) {
    if (confirm('このオーダーを削除しますか？')) { orders.splice(i, 1); renderTable(); }
  }

  function clearForm() {
    ['customerName','productName','size','quantity','deliveryDate','remarks'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('voiceResult').classList.remove('show');
    document.getElementById('customerName').focus();
  }

  async function sendToSheet() {
    if (!orders.length) { alert('⚠️ オーダーがありません'); return; }
    const btn = document.querySelector('.btn-sheet');
    const msg = document.getElementById('sendMsg');
    btn.textContent = '📊 送信中...';
    btn.disabled = true;
    try {
      await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(orders) });
      msg.className = 'send-msg success';
      msg.textContent = '✅ スプレッドシートに送信しました！';
      orders = [];
      renderTable();
    } catch(e) {
      msg.className = 'send-msg error';
      msg.textContent = '❌ 送信に失敗しました。';
    }
    btn.textContent = '📊 スプレッドシートに送信';
    btn.disabled = false;
  }

  function exportCSV() {
    if (!orders.length) { alert('⚠️ オーダーがありません'); return; }
    const v = document.getElementById('visitDate').value;
    const p = document.getElementById('producerName').value;
    const header = ['訪問日','生産者名','お客様名','商品名','サイズ','数量','希望納期','備考'];
    const rows = orders.map(o => [o.visitDate, p, o.customerName, o.productName, o.size, o.quantity, o.deliveryDate, o.remarks]);
    const csv = [header, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `オーダー_${v}_${p || '生産者'}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  }
</script>
</body>
</html>
